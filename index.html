<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播時數達標追蹤</title>
<style>
  :root{
    /* 薄荷綠主題（配合 Kang Chunil 立繪）。變數名沿用 pink 但值已改成薄荷綠 */
    --bg:#eafaf1; --card:#ffffff; --pink:#3fbf8f; --pink-soft:#c5efdb;
    --ink:#33473f; --muted:#8aa79b; --good:#2fae6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",
    "Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 60px;
  }
  .wrap{width:100%;max-width:480px;}
  .hero{
    width:100%;display:block;border-radius:20px;margin-bottom:16px;
    box-shadow:0 8px 28px rgba(63,191,143,.22);
  }
  h1{font-size:20px;margin:4px 0 2px;display:flex;align-items:center;gap:8px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  select{
    flex:1;padding:11px 12px;border:1px solid var(--pink-soft);border-radius:12px;
    font-size:16px;background:#fff;color:var(--ink);appearance:none;
  }
  .card{
    background:var(--card);border-radius:20px;padding:24px 22px;
    box-shadow:0 6px 24px rgba(63,191,143,.14);margin-bottom:16px;
  }
  .big{font-size:15px;color:var(--muted);margin-bottom:6px;}
  .hours{font-size:46px;font-weight:800;line-height:1;color:var(--pink);}
  .hours small{font-size:18px;font-weight:600;color:var(--muted);margin-left:4px;}
  .goalline{margin-top:14px;font-size:15px;}
  .goalline b{font-size:18px;}
  .remain{color:var(--pink);}
  .done{color:var(--good);}
  .bar{height:16px;background:var(--pink-soft);border-radius:99px;overflow:hidden;margin-top:16px;}
  .bar > i{
    display:block;height:100%;border-radius:99px;
    background:linear-gradient(90deg,#7fe0b4,var(--pink));
    width:0;transition:width .6s ease;
  }
  .bar.full > i{background:linear-gradient(90deg,#3ad17a,var(--good));}
  .pct{text-align:right;font-size:13px;color:var(--muted);margin-top:6px;}
  .meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:4px;}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px;}
  th,td{padding:9px 6px;text-align:center;border-bottom:1px solid #f1e6e8;}
  th{color:var(--muted);font-weight:600;font-size:12px;}
  td.min{font-weight:700;color:var(--pink);}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:18px;line-height:1.6;}
  .badge{display:inline-block;background:var(--pink-soft);color:var(--pink);
    font-size:12px;padding:3px 9px;border-radius:99px;margin-left:6px;vertical-align:middle;}
  .err{background:#fff;border:1px dashed var(--pink);color:var(--pink);
    padding:14px;border-radius:12px;font-size:13px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <img class="hero" src="chunil.jpg" alt="Kang Chunil">
  <h1>📊 라이브 시간 목표 트래커<br><span style="font-size:14px;font-weight:600;color:var(--muted);">直播時數達標追蹤</span></h1>
  <div class="sub">목표 <b>45시간 / 월</b>　|　目標 <b>45 小時 / 月</b></div>

  <div class="row">
    <select id="month"></select>
  </div>

  <div class="card">
    <div class="big">이번 달 라이브 · 本月已播</div>
    <div class="hours"><span id="hrs">0</span><small>시간 小時</small></div>

    <div class="goalline" id="goal"></div>

    <div class="bar" id="bar"><i id="fill"></i></div>
    <div class="pct" id="pct">0%</div>
    <div class="meta"><span id="cntInfo"></span><span>목표 45시간 · 目標 45 小時</span></div>
  </div>

  <div class="card">
    <div class="big" style="margin-bottom:10px;">이번 달 라이브 내역 · 本月場次明細</div>
    <div id="tableWrap"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ===================== 設定區 ===================== */
const GOAL_HOURS = 45;          // 達標門檻（小時/月）

// 資料來源：兩種模式
//  A) DEMO 模式：用下面內建範例資料（你截圖那些）
//  B) SHEET 模式：填入你的試算表 ID，會自動讀各月分頁
//     把 SHEET_ID 換成你的（網址裡 /d/ 後面那串），DEMO 會自動關掉
const SHEET_ID = "11BeDer8jmPFgKuJvqx8a29J_sR_bnPIMCcKpx7_vkZ0";  // 你的試算表

// 內建範例（對應你截圖的 2026.05 分頁）
const DEMO = {
  "2026.05": [
    ["5/1","18:02","19:11",69],["5/2","16:46","17:59",73],
    ["5/3","20:40","22:12",92],["5/4","18:16","19:52",96],
    ["5/6","19:31","20:21",50],["5/11","17:44","19:00",76],
    ["5/15","4:40","6:03",83],["5/16","14:18","14:35",17],
    ["5/17","14:30","17:33",183],["5/19","18:12","20:11",119],
    ["5/20","17:00","19:54",174],["5/21","14:02","15:08",66],
    ["5/21","15:40","17:17",97],["5/22","14:16","17:04",168],
    ["5/22","19:11","21:32",141]
  ],
  "2026.06": [
    ["6/1","20:00","21:30",90],["6/3","19:00","20:45",105],
    ["6/8","18:30","20:00",90]
  ]
};
/* ================================================= */

const $ = id => document.getElementById(id);
const USE_SHEET = SHEET_ID.trim().length > 0;

// 解析「Total minutes」欄，加總成小時
function sumHours(rows){
  let m = 0;
  rows.forEach(r => { const v = Number(r[3]); if(!isNaN(v)) m += v; });
  return m/60;
}

function render(monthKey, rows){
  const hours = sumHours(rows);
  const hrsR = Math.round(hours*10)/10;
  $("hrs").textContent = hrsR;

  const remain = Math.round((GOAL_HOURS - hours)*10)/10;
  if(remain > 0){
    $("goal").innerHTML = `목표까지 <b class="remain">${remain}</b>시간 남음<br>`
      + `<span style="font-size:13px;color:var(--muted);">離達標還差 <b class="remain">${remain}</b> 小時</span>`;
  }else{
    $("goal").innerHTML = `🎉 목표 달성! <b class="done">${Math.abs(remain)}</b>시간 초과<br>`
      + `<span style="font-size:13px;color:var(--muted);">🎉 已達標！超出 <b class="done">${Math.abs(remain)}</b> 小時</span>`;
  }

  const pct = Math.min(100, Math.round(hours/GOAL_HOURS*100));
  $("fill").style.width = pct + "%";
  $("pct").textContent = pct + "%";
  $("bar").classList.toggle("full", hours >= GOAL_HOURS);
  $("cntInfo").textContent = `총 ${rows.length}회 · 共 ${rows.length} 場`;

  // 明細表
  let html = '<table><thead><tr><th>날짜<br>日期</th><th>시작<br>開播</th><th>종료<br>結束</th><th>분<br>分鐘</th></tr></thead><tbody>';
  rows.forEach(r=>{
    html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="min">${r[3]}</td></tr>`;
  });
  html += '</tbody></table>';
  $("tableWrap").innerHTML = rows.length ? html
    : '<div class="err">이번 달 데이터가 없습니다<br>這個月還沒有資料</div>';
}

// 從 Google Sheet 讀某個分頁（gviz，用分頁名稱）
async function fetchSheet(sheetName){
  // 加亂數參數防止瀏覽器/CDN 回舊快取
  const bust = Math.floor(performance.now()) + "_" + sheetName.length;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?`
            + `tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&_=${bust}`;
  const res = await fetch(url, {cache:"no-store"});
  const text = await res.text();
  // 簡易 CSV 解析（對空行/解析失敗做防呆，避免整段中斷）
  const lines = text.trim().split("\n").map(l=>{
    const m = l.match(/("([^"]|"")*"|[^,]*)(,|$)/g);
    if(!m) return [];
    return m.slice(0,-1)
            .map(c=>c.replace(/,$/,"").replace(/^"|"$/g,"").replace(/""/g,'"').trim());
  });
  // 去掉標題列，只保留「有日期 + 分鐘是有效數字」的場次列
  // （過濾掉尾巴的合計列、空列、以及右側公式欄殘留）
  return lines.slice(1)
    .map(r=>[r[0],r[1],r[2],Number(r[3])])
    .filter(r=> r[0] && r[1] && !isNaN(r[3]) && r[3] > 0);
}

// 判斷某分頁是否「真的存在」。
// gviz 對不存在的分頁不會報錯，而是 fallback 回第一個分頁的資料，
// 所以這裡比對：回傳資料第一筆的「月份」是否等於我們要查的月份。
// 例：查 2026.07 卻回 "5/1" 開頭 → 不是 7 月 → 判定該分頁不存在。
function rowsMatchMonth(rows, monthKey){
  if(!rows.length) return false;
  const wantM = Number(monthKey.split(".")[1]);     // 2026.07 -> 7
  const firstDate = String(rows[0][0]);             // "7/1" 或 "5/1"
  const gotM = Number(firstDate.split("/")[0]);     // 取斜線前的月
  return gotM === wantM;
}

async function loadMonth(monthKey){
  if(USE_SHEET){
    try{
      const rows = await fetchSheet(monthKey);
      render(monthKey, rows);
    }catch(e){
      $("tableWrap").innerHTML = '<div class="err">불러오기 실패<br>讀取失敗</div>';
    }
  }else{
    render(monthKey, DEMO[monthKey] || []);
  }
}

// 候選月份：從 2026.05（最早紀錄）到「今天的月份」，往後多看 1 個月以防跨月。
// 用使用者裝置目前時間決定上限，不寫死，這樣到 7、8 月會自動延伸。
function candidateMonths(){
  const now = new Date();
  const endY = now.getFullYear(), endM = now.getMonth()+1; // 1-based
  const keys=[];
  let y=2026, m=5;                          // 從 2026.05 起跑
  while(y < endY || (y===endY && m <= endM)){
    keys.push(`${y}.${String(m).padStart(2,"0")}`);
    m++; if(m>12){m=1;y++;}
  }
  return keys;
}

async function buildMonths(){
  const sel = $("month");
  if(!USE_SHEET){
    const keys = Object.keys(DEMO);
    keys.forEach(k=>addOpt(sel,k));
    sel.value = keys[keys.length-1];
    return sel.value;
  }
  // SHEET 模式：序列化逐月試抓（避免並發限流），用 fallback 偵測判斷分頁是否真的存在
  const cands = candidateMonths();
  const have = [];
  for(const k of cands){
    try{
      const rows = await fetchSheet(k);
      if(rowsMatchMonth(rows, k)) have.push(k);   // 月份對得上才算真的有這個分頁
    }catch(e){ /* 略過這個月 */ }
  }
  have.forEach(k=>addOpt(sel,k));
  sel.value = have.length ? have[have.length-1] : "";
  return sel.value;
}

function addOpt(sel,k){
  const o=document.createElement("option");
  o.value=k;
  o.textContent=k;          // 直接顯示 2026.05 這種格式
  sel.appendChild(o);
}

// 把任何未捕捉的錯誤直接顯示在畫面上（方便除錯，不再只是空白）
window.addEventListener("error", e=>{
  const t=$("tableWrap"); if(t) t.innerHTML =
    '<div class="err">⚠️ 錯誤：'+ (e.message||e) +'</div>';
});

(async function init(){
  try{
    if($("src")) $("src").textContent = USE_SHEET ? "Google Sheet" : "範例資料";
    $("foot").innerHTML = USE_SHEET
      ? "데이터는 Google Sheet에서 실시간으로 가져옵니다<br>"
        + "資料即時取自 Google Sheet，更新表格網頁就會跟著更新"
      : "目前顯示的是範例資料";
    $("tableWrap").innerHTML = '<div class="err" style="border-style:solid;">불러오는 중… 讀取中…</div>';
    const first = await buildMonths();
    $("month").addEventListener("change", e=>loadMonth(e.target.value));
    if(first) loadMonth(first);
    else $("tableWrap").innerHTML = '<div class="err">월 데이터를 찾을 수 없습니다<br>找不到月份分頁</div>';
  }catch(err){
    $("tableWrap").innerHTML = '<div class="err">⚠️ 載入失敗：'+ (err.message||err) +'</div>';
  }
})();
</script>
</body>
</html>
